name: macos-codex-installer

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/macos-codex-installer.yml"
      - "installer/**"
      - "codex_agents/**"
      - "codex_rules/**"
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "WORKSPACE_CONTEXT_TEMPLATE.toml"
  pull_request:
    paths:
      - ".github/workflows/macos-codex-installer.yml"
      - "installer/**"
      - "codex_agents/**"
      - "codex_rules/**"
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "WORKSPACE_CONTEXT_TEMPLATE.toml"

jobs:
  macos-install:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate shell syntax
        run: |
          bash -n installer/CodexMultiAgent.sh
          bash -n installer/Bootstrap.sh

      - name: Test local installer global
        env:
          CODEX_HOME: ${{ runner.temp }}/home-local/.codex
        run: |
          mkdir -p "$(dirname "$CODEX_HOME")"
          bash installer/CodexMultiAgent.sh install-global --force --no-prompt
          test -f "$CODEX_HOME/AGENTS.md"
          test -f "$CODEX_HOME/agents/default.toml"
          test -f "$CODEX_HOME/rules/default.rules"
          test -f "$CODEX_HOME/multiagent-kit/README.md"
          test -f "$CODEX_HOME/multiagent-kit/WORKSPACE_CONTEXT_TEMPLATE.toml"

      - name: Test local installer workspace
        env:
          CODEX_HOME: ${{ runner.temp }}/home-local/.codex
          WORKSPACE: ${{ runner.temp }}/workspace-local
        run: |
          mkdir -p "$WORKSPACE"
          bash installer/CodexMultiAgent.sh apply-workspace --workspace "$WORKSPACE" --include-docs --template standard --force --no-prompt
          test -f "$WORKSPACE/AGENTS.md"
          test -f "$WORKSPACE/STATE.md"
          test -f "$WORKSPACE/docs/codex-multiagent/README.md"
          test -f "$WORKSPACE/docs/codex-multiagent/codex_rules/default.rules"
          test -f "$WORKSPACE/docs/codex-multiagent/WORKSPACE_CONTEXT_TEMPLATE.toml"
          test -f "$WORKSPACE/docs/codex-multiagent/WORKSPACE_CONTEXT_GUIDE.md"

      - name: Test local installer workspace with WORKSPACE_CONTEXT
        env:
          CODEX_HOME: ${{ runner.temp }}/home-local/.codex
          WORKSPACE: ${{ runner.temp }}/workspace-context-local
        run: |
          mkdir -p "$WORKSPACE"
          cp WORKSPACE_CONTEXT_TEMPLATE.toml "$WORKSPACE/WORKSPACE_CONTEXT.toml"
          bash installer/CodexMultiAgent.sh apply-workspace --workspace "$WORKSPACE" --include-docs --template standard --force --no-prompt
          test -f "$WORKSPACE/AGENTS.md"
          test -f "$WORKSPACE/STATE.md"
          grep -q "# Workspace Override: example-workspace" "$WORKSPACE/AGENTS.md"
          grep -q "Package manager: pnpm" "$WORKSPACE/AGENTS.md"
          grep -q "## Orchestration Profile" "$WORKSPACE/STATE.md"
          grep -q 'execution_topology: `single-session`' "$WORKSPACE/STATE.md"
          grep -q "## Contract Freeze" "$WORKSPACE/STATE.md"
          test -f "$WORKSPACE/docs/codex-multiagent/WORKSPACE_CONTEXT_TEMPLATE.toml"
          test -f "$WORKSPACE/docs/codex-multiagent/WORKSPACE_CONTEXT_GUIDE.md"

      - name: Test bootstrap installer
        env:
          CODEX_HOME: ${{ runner.temp }}/home-bootstrap/.codex
          WORKSPACE: ${{ runner.temp }}/workspace-bootstrap
          SCRIPT_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/installer/Bootstrap.sh
          CODEX_MULTIAGENT_ZIP_URL: https://github.com/${{ github.repository }}/archive/${{ github.sha }}.zip
        run: |
          mkdir -p "$(dirname "$CODEX_HOME")" "$WORKSPACE"
          bash installer/Bootstrap.sh install-global
          test -f "$CODEX_HOME/AGENTS.md"
          test -f "$CODEX_HOME/agents/default.toml"
          test -f "$CODEX_HOME/rules/default.rules"
          rm -rf "$CODEX_HOME"
          mkdir -p "$(dirname "$CODEX_HOME")"
          curl -fsSL "$SCRIPT_URL" | bash -s -- install-global
          test -f "$CODEX_HOME/AGENTS.md"
          test -f "$CODEX_HOME/agents/default.toml"
          test -f "$CODEX_HOME/rules/default.rules"
          bash installer/Bootstrap.sh apply-workspace --workspace "$WORKSPACE" --include-docs
          test -f "$WORKSPACE/AGENTS.md"
          test -f "$WORKSPACE/docs/codex-multiagent/README.md"
          rm -rf "$WORKSPACE"
          mkdir -p "$WORKSPACE"
          curl -fsSL "$SCRIPT_URL" | bash -s -- apply-workspace --workspace "$WORKSPACE" --include-docs
          test -f "$WORKSPACE/AGENTS.md"
          test -f "$WORKSPACE/docs/codex-multiagent/README.md"

      - name: Test bootstrap installer workspace with WORKSPACE_CONTEXT
        env:
          CODEX_HOME: ${{ runner.temp }}/home-bootstrap/.codex
          WORKSPACE: ${{ runner.temp }}/workspace-context-bootstrap
          SCRIPT_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/installer/Bootstrap.sh
          CODEX_MULTIAGENT_ZIP_URL: https://github.com/${{ github.repository }}/archive/${{ github.sha }}.zip
        run: |
          mkdir -p "$(dirname "$CODEX_HOME")" "$WORKSPACE"
          cp WORKSPACE_CONTEXT_TEMPLATE.toml "$WORKSPACE/WORKSPACE_CONTEXT.toml"
          curl -fsSL "$SCRIPT_URL" | bash -s -- install-global
          curl -fsSL "$SCRIPT_URL" | bash -s -- apply-workspace --workspace "$WORKSPACE" --include-docs
          test -f "$WORKSPACE/AGENTS.md"
          test -f "$WORKSPACE/STATE.md"
          grep -q "# Workspace Override: example-workspace" "$WORKSPACE/AGENTS.md"
          grep -q "## Orchestration Profile" "$WORKSPACE/STATE.md"
          grep -q 'execution_topology: `single-session`' "$WORKSPACE/STATE.md"
          grep -q "## Contract Freeze" "$WORKSPACE/STATE.md"
